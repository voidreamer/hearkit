name: Release

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri_args: "--target universal-apple-darwin"
          - os: ubuntu-22.04
            rust_targets: ""
            tauri_args: ""
          - os: windows-latest
            rust_targets: ""
            tauri_args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "tauri-${{ matrix.os }}"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            cmake \
            libclang-dev \
            clang

      - name: Install Windows dependencies
        if: matrix.os == 'windows-latest'
        run: choco install llvm -y

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        run: cargo tauri build ${{ matrix.tauri_args }}

      # --- Tag push: upload to GitHub Release ---

      - name: Upload macOS artifacts to release
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            target/universal-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload Linux artifacts to release
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage

      - name: Upload Windows artifacts to release
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi

      # --- PR: upload as workflow artifact ---

      - name: Upload macOS artifacts
        if: "!startsWith(github.ref, 'refs/tags/') && matrix.os == 'macos-latest'"
        uses: actions/upload-artifact@v4
        with:
          name: hearkit-macos
          path: target/universal-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload Linux artifacts
        if: "!startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-22.04'"
        uses: actions/upload-artifact@v4
        with:
          name: hearkit-linux
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage

      - name: Upload Windows artifacts
        if: "!startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows-latest'"
        uses: actions/upload-artifact@v4
        with:
          name: hearkit-windows
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
